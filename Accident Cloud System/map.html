<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accident Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #534AB7;
      --primary-light: #7F77DD;
      --bg: #EEEDFE;
      --surface: #ffffff;
      --text: #1a1a2e;
      --muted: #888;
      --danger: #e24b4a;
      --success: #057a55;
      --warning: #c27803;
      --shadow: 0 8px 32px rgba(83,74,183,0.13);
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 0 #e0dff5;
      position: relative;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--bg);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    header h1 span {
      color: var(--primary-light);
      font-weight: 300;
    }

    .header-nav {
      display: flex;
      gap: 6px;
    }

    .nav-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .nav-btn.outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid #e0dff5;
    }

    .nav-btn.outline:hover { background: var(--bg); color: var(--primary); }

    .nav-btn.primary {
      background: var(--primary);
      color: #fff;
    }

    .nav-btn.primary:hover { background: #3C3489; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      height: calc(100vh - 60px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px;
      background: var(--surface);
      border-right: 1px solid #e0dff5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #e0dff5;
    }

    .sidebar-header h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--muted);
      font-weight: 300;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid #e0dff5;
    }

    .stat-chip {
      flex: 1;
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-chip .num {
      font-size: 20px;
      font-weight: 600;
      color: var(--primary);
      line-height: 1.2;
    }

    .stat-chip .lbl {
      font-size: 9px;
      color: var(--muted);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Filter */
    .filter-bar {
      padding: 10px 18px;
      border-bottom: 1px solid #e0dff5;
      display: flex;
      gap: 6px;
    }

    .filter-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #e0dff5;
      background: transparent;
      font-family: 'Sora', sans-serif;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--muted);
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Accident list */
    .accident-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .accident-list::-webkit-scrollbar { width: 4px; }
    .accident-list::-webkit-scrollbar-track { background: transparent; }
    .accident-list::-webkit-scrollbar-thumb { background: #d0cef5; border-radius: 2px; }

    .accident-item {
      padding: 12px 18px;
      border-bottom: 1px solid #f3f3fb;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .accident-item:hover { background: var(--bg); }
    .accident-item.active { background: #f0effe; }

    .acc-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .acc-dot.new     { background: var(--danger); }
    .acc-dot.review  { background: var(--warning); }
    .acc-dot.done    { background: var(--success); }

    .acc-info { flex: 1; min-width: 0; }

    .acc-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .acc-meta {
      font-size: 10px;
      color: var(--muted);
      font-weight: 300;
    }

    .acc-badge {
      font-size: 9px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .acc-badge.new    { background: #fde8e8; color: var(--danger); }
    .acc-badge.review { background: #fdf3cd; color: var(--warning); }
    .acc-badge.done   { background: #def7ec; color: var(--success); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state svg { margin-bottom: 10px; opacity: 0.4; }
    .empty-state p { font-size: 12px; }

    /* ── Map area ── */
    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Map overlay controls */
    .map-controls {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-ctrl-btn {
      background: var(--surface);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .map-ctrl-btn:hover { background: var(--bg); }

    .map-ctrl-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* Pin mode banner */
    .pin-banner {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      box-shadow: var(--shadow);
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 5;
    }

    .pin-banner.visible { display: flex; }

    .pin-banner button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      cursor: pointer;
    }

    /* Detail popup (custom) */
    .detail-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 260px;
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow);
      z-index: 5;
      overflow: hidden;
      display: none;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-panel.visible { display: block; }

    .detail-header {
      background: var(--primary);
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detail-header h3 { font-size: 13px; font-weight: 600; }

    .detail-close {
      background: none; border: none;
      color: rgba(255,255,255,0.75);
      cursor: pointer; font-size: 16px;
    }

    .detail-body { padding: 14px; }

    .detail-row {
      display: flex;
      gap: 8px;
      font-size: 12px;
      margin-bottom: 8px;
      align-items: flex-start;
    }

    .detail-row .di-label {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
      min-width: 70px;
      padding-top: 1px;
    }

    .detail-row .di-val {
      color: var(--text);
      font-size: 12px;
      font-weight: 400;
      flex: 1;
    }

    .detail-img {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 10px;
      display: none;
    }

    .detail-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .detail-actions button {
      flex: 1;
      padding: 7px;
      border-radius: 6px;
      border: none;
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-delete {
      background: #fde8e8;
      color: var(--danger);
    }

    .btn-delete:hover { background: #fcc; }

    /* Loading overlay */
    .map-loading {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      gap: 14px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0dff5;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .map-loading p {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="#534AB7" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 8v4l3 3"/>
      </svg>
    </div>
    <h1>Accident <span>Cloud System</span></h1>
  </div>

  <nav class="header-nav">
    <a href="dashboard.html" class="nav-btn outline">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="view.html" class="nav-btn outline">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Reports
    </a>
    <a href="report.html" class="nav-btn primary">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Report
    </a>
  </nav>
</header>

<!-- ── Layout ── -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Accident Reports</h2>
      <p>Click any item to locate it on the map</p>
    </div>

    <div class="stats-row">
      <div class="stat-chip">
        <div class="num" id="totalCount">–</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat-chip">
        <div class="num" id="newCount" style="color:#e24b4a">–</div>
        <div class="lbl">New</div>
      </div>
      <div class="stat-chip">
        <div class="num" id="reviewCount" style="color:#c27803">–</div>
        <div class="lbl">Review</div>
      </div>
      <div class="stat-chip">
        <div class="num" id="doneCount" style="color:#057a55">–</div>
        <div class="lbl">Done</div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all"   onclick="setFilter('all',this)">All</button>
      <button class="filter-btn"        data-filter="new"   onclick="setFilter('new',this)">New</button>
      <button class="filter-btn"        data-filter="review" onclick="setFilter('review',this)">Review</button>
      <button class="filter-btn"        data-filter="done"  onclick="setFilter('done',this)">Done</button>
    </div>

    <div class="accident-list" id="accidentList">
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        <p>Loading reports…</p>
      </div>
    </div>
  </aside>

  <!-- Map -->
  <div class="map-container">
    <div class="map-loading" id="mapLoading">
      <div class="spinner"></div>
      <p>Loading map…</p>
    </div>

    <div id="map"></div>

    <!-- Map controls -->
    <div class="map-controls">
      <button class="map-ctrl-btn" onclick="locateMe()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        My Location
      </button>
      <button class="map-ctrl-btn" id="pinModeBtn" onclick="togglePinMode()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Pick Location
      </button>
    </div>

    <!-- Pin mode banner -->
    <div class="pin-banner" id="pinBanner">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Click anywhere on the map to pick a location
      <button onclick="togglePinMode()">Cancel</button>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <h3 id="detailTitle">Accident Details</h3>
        <button class="detail-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-body">
        <img class="detail-img" id="detailImg" alt="Accident image">
        <div class="detail-row">
          <span class="di-label">Location</span>
          <span class="di-val" id="detailLocation">–</span>
        </div>
        <div class="detail-row">
          <span class="di-label">Description</span>
          <span class="di-val" id="detailDesc">–</span>
        </div>
        <div class="detail-row">
          <span class="di-label">Phone</span>
          <span class="di-val" id="detailPhone">–</span>
        </div>
        <div class="detail-row">
          <span class="di-label">Type</span>
          <span class="di-val" id="detailType">–</span>
        </div>
        <div class="detail-row">
          <span class="di-label">Time</span>
          <span class="di-val" id="detailTime">–</span>
        </div>
        <div class="detail-actions">
          <button class="btn-delete" id="detailDeleteBtn">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Firebase ── -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, deleteDoc, doc }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5i7LkVRCKg2L2PrzwNm7PeDYKytR-jOc",
 authDomain: "accident-cloud-system-41ad9.firebaseapp.com",
 projectId: "accident-cloud-system-41ad9",
 storageBucket: "accident-cloud-system-41ad9.firebasestorage.app",
 messagingSenderId: "460550861200",
 appId: "1:460550861200:web:bd0a77ac5a6b29a52c4315",
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── State ──────────────────────────────────────────────────
let allAccidents  = [];
let markers       = {};
let activeFilter  = 'all';
let currentDocId  = null;
let map, userMarker;

// ── Helpers ────────────────────────────────────────────────
function statusOf(data) {
  if (!data.status) return 'new';
  return data.status; // 'new' | 'review' | 'done'
}

function formatTime(ts) {
  if (!ts) return '–';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ── Map init ───────────────────────────────────────────────
window.initMap = function() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 27.5114, lng: 41.7208 }, // حائل، المملكة العربية السعودية
    zoom: 7,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControlOptions: { position: google.maps.ControlPosition.TOP_RIGHT },
    styles: [
      { featureType:'poi', stylers:[{visibility:'off'}] },
      { featureType:'transit', stylers:[{visibility:'off'}] }
    ]
  });

  document.getElementById('mapLoading').style.display = 'none';

  // click for pin mode
  map.addListener('click', (e) => {
    if (window._pinMode) {
      const lat = e.latLng.lat().toFixed(6);
      const lng = e.latLng.lng().toFixed(6);
      // Redirect to report page with coords
     window.location.href = `report.html?lat=${lat}&lng=${lng}`;
    }
  });

  // Start Firestore listener after map ready
  listenToAccidents();
};

// ── Firestore real-time listener ───────────────────────────
function listenToAccidents() {
  onSnapshot(collection(db, "accidents"), (snapshot) => {
    allAccidents = [];

    // Remove old markers
    Object.values(markers).forEach(m => m.setMap(null));
    markers = {};

    snapshot.forEach(docSnap => {
      const data = { id: docSnap.id, ...docSnap.data() };
      allAccidents.push(data);
      addMarker(data);
    });

    updateStats();
    renderList();
  });
}

// ── Marker colours ─────────────────────────────────────────
const PIN_COLORS = { new:'#e24b4a', review:'#c27803', done:'#057a55' };

function addMarker(data) {
  const lat = parseFloat(data.lat);
  const lng = parseFloat(data.lng);
  if (isNaN(lat) || isNaN(lng)) return;

  const status = statusOf(data);
  const color  = PIN_COLORS[status] || '#534AB7';

  const marker = new google.maps.Marker({
    position: { lat, lng },
    map,
    title: data.description || 'Accident',
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: color,
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 2
    },
    animation: google.maps.Animation.DROP
  });

  marker.addListener('click', () => showDetail(data));
  markers[data.id] = marker;
}

// ── Stats ──────────────────────────────────────────────────
function updateStats() {
  const total  = allAccidents.length;
  const newC   = allAccidents.filter(a => statusOf(a) === 'new').length;
  const revC   = allAccidents.filter(a => statusOf(a) === 'review').length;
  const doneC  = allAccidents.filter(a => statusOf(a) === 'done').length;

  document.getElementById('totalCount').textContent  = total;
  document.getElementById('newCount').textContent    = newC;
  document.getElementById('reviewCount').textContent = revC;
  document.getElementById('doneCount').textContent   = doneC;
}

// ── Sidebar list ───────────────────────────────────────────
function renderList() {
  const list = document.getElementById('accidentList');
  const data = activeFilter === 'all'
    ? allAccidents
    : allAccidents.filter(a => statusOf(a) === activeFilter);

  if (!data.length) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
        <p>No reports found</p>
      </div>`;
    return;
  }

  list.innerHTML = data.map(acc => {
    const s = statusOf(acc);
    return `
    <div class="accident-item" id="item-${acc.id}" onclick="focusAccident('${acc.id}')">
      <div class="acc-dot ${s}"></div>
      <div class="acc-info">
        <div class="acc-title">${acc.description || 'No description'}</div>
        <div class="acc-meta">${formatTime(acc.time)}</div>
      </div>
      <span class="acc-badge ${s}">${s}</span>
    </div>`;
  }).join('');
}

// ── Focus on accident ──────────────────────────────────────
window.focusAccident = function(id) {
  const acc = allAccidents.find(a => a.id === id);
  if (!acc) return;

  // Highlight list item
  document.querySelectorAll('.accident-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('item-' + id);
  if (item) item.classList.add('active');

  // Pan map
  const lat = parseFloat(acc.lat);
  const lng = parseFloat(acc.lng);
  if (!isNaN(lat) && !isNaN(lng)) {
    map.panTo({ lat, lng });
    map.setZoom(14);

    // Bounce marker
    if (markers[id]) {
      markers[id].setAnimation(google.maps.Animation.BOUNCE);
      setTimeout(() => markers[id].setAnimation(null), 2000);
    }
  }

  showDetail(acc);
};

// ── Detail panel ───────────────────────────────────────────
function showDetail(data) {
  currentDocId = data.id;
  document.getElementById('detailTitle').textContent    = data.type || 'Accident';
  document.getElementById('detailLocation').textContent = (data.lat && data.lng) ? `${data.lat}, ${data.lng}` : (data.location || '–');
  document.getElementById('detailDesc').textContent     = data.description || '–';
  document.getElementById('detailPhone').textContent    = data.phone || '–';
  document.getElementById('detailType').textContent     = data.type  || '–';
  document.getElementById('detailTime').textContent     = formatTime(data.time);

  const img = document.getElementById('detailImg');
  if (data.image) { img.src = data.image; img.style.display = 'block'; }
  else              { img.style.display = 'none'; }

  document.getElementById('detailDeleteBtn').onclick = () => deleteAccident(data.id);
  document.getElementById('detailPanel').classList.add('visible');
}

window.closeDetail = function() {
  document.getElementById('detailPanel').classList.remove('visible');
  currentDocId = null;
};

// ── Delete ──────────────────────────────────────────────────
async function deleteAccident(id) {
  if (!confirm('Delete this report?')) return;
  await deleteDoc(doc(db, "accidents", id));
  closeDetail();
}

// ── Filter ─────────────────────────────────────────────────
window.setFilter = function(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
};

// ── My Location ─────────────────────────────────────────────
window.locateMe = function() {
  if (!navigator.geolocation) return alert('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(pos => {
    const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    map.panTo(latlng);
    map.setZoom(14);
    if (userMarker) userMarker.setMap(null);
    userMarker = new google.maps.Marker({
      position: latlng,
      map,
      title: 'My Location',
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 8,
        fillColor: '#534AB7',
        fillOpacity: 1,
        strokeColor: '#fff',
        strokeWeight: 2
      }
    });
  }, () => alert('Could not get your location'));
};

// ── Pin Mode ────────────────────────────────────────────────
window._pinMode = false;
window.togglePinMode = function() {
  window._pinMode = !window._pinMode;
  const btn    = document.getElementById('pinModeBtn');
  const banner = document.getElementById('pinBanner');
  if (window._pinMode) {
    btn.classList.add('active');
    banner.classList.add('visible');
    map.setOptions({ draggableCursor: 'crosshair' });
  } else {
    btn.classList.remove('active');
    banner.classList.remove('visible');
    map.setOptions({ draggableCursor: '' });
  }
};
</script>
