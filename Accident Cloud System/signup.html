<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: #C7D2FF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: #fff;
      width: 380px;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(48,27,70,0.13);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #7A86FF, #6C72FF, #7A86FF);
      background-size: 200%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .logo {
      width: 44px; height: 44px;
      background: #C7D2FF;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.4rem;
    }

    h2 { font-size: 20px; font-weight: 600; margin: 0 0 4px; color: #1a1a2e; }
    .sub { font-size: 13px; color: #888; font-weight: 300; margin: 0 0 1.8rem; }

    .field { margin-bottom: 0.9rem; }

    label {
      display: block;
      font-size: 11px; font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 5px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg.icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: #aaa;
      pointer-events: none;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px 9px 36px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      background: #f3f5ff;
      border: 1px solid #C7D2FF;
      border-radius: 8px;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #6C72FF;
      box-shadow: 0 0 0 3px rgba(108,114,255,0.13);
      background: #fff;
    }

    input.error {
      border-color: #e24b4a;
      box-shadow: 0 0 0 3px rgba(226,75,74,0.1);
    }

    .error-msg {
      font-size: 11px;
      color: #e24b4a;
      margin-top: 4px;
      display: none;
    }

    .toggle-pw {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; padding: 4px;
      color: #aaa; display: flex; align-items: center;
    }
    .toggle-pw:hover { color: #6C72FF; }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      margin-top: 1.2rem;
      background: #6C72FF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover  { background: #5A5FE0; }
    button[type="submit"]:active { transform: scale(0.98); }

    .footer {
      margin-top: 1.3rem;
      text-align: center;
      font-size: 13px;
      color: #888;
    }

    .footer a { color: #6C72FF; text-decoration: none; font-weight: 500; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="#6C72FF" stroke-width="2" stroke-linecap="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <line x1="19" y1="8" x2="19" y2="14"/>
      <line x1="22" y1="11" x2="16" y2="11"/>
    </svg>
  </div>

  <h2>Create account</h2>
  <p class="sub">Join us — it only takes a minute</p>

  <form id="signupForm">

    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" id="email" placeholder="you@example.com"
               autocomplete="email" required>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="pw1"
               placeholder="••••••••" autocomplete="new-password" required>
        <button type="button" class="toggle-pw" onclick="togglePw('pw1','eye1')">
          <svg id="eye1" width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="pw2"
               placeholder="••••••••" autocomplete="new-password" required>
        <button type="button" class="toggle-pw" onclick="togglePw('pw2','eye2')">
          <svg id="eye2" width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="error-msg" id="pwError">Passwords do not match</p>
    </div>

    <button type="submit" id="submitBtn">Create Account</button>
  </form>

  <div class="firebase-msg" id="firebaseMsg"></div>

  <p class="footer">Already have an account? <a href="login.html">Log in</a></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5i7LkVRCKg2L2PrzwNm7PeDYKytR-jOc",
    authDomain: "accident-cloud-system-41ad9.firebaseapp.com",
    projectId: "accident-cloud-system-41ad9",
    storageBucket: "accident-cloud-system-41ad9.firebasestorage.app",
    messagingSenderId: "460550861200",
    appId: "1:460550861200:web:bd0a77ac5a6b29a52c4315"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const msgEl     = document.getElementById('firebaseMsg');
  const submitBtn = document.getElementById('submitBtn');

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className = 'firebase-msg ' + type;
  }

  function togglePw(inputId, iconId) {
    const inp = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  window.togglePw = togglePw;

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const pw1   = document.getElementById('pw1').value;
    const pw2   = document.getElementById('pw2').value;

    // Validate password match
    if (pw1 !== pw2) {
      document.getElementById('pw2').classList.add('error');
      document.getElementById('pwError').style.display = 'block';
      return;
    }
    document.getElementById('pw2').classList.remove('error');
    document.getElementById('pwError').style.display = 'none';

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';

    try {
      await createUserWithEmailAndPassword(auth, email, pw1);
      showMsg('✅ Account created! Redirecting...', 'success');

      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Account';
      const errors = {
        'auth/email-already-in-use': '⚠️ Email already registered.',
        'auth/weak-password':        '⚠️ Password must be at least 6 characters.',
        'auth/invalid-email':        '⚠️ Invalid email address.',
        'auth/operation-not-allowed': '⚠️ Account creation is disabled.',
      };
      showMsg(errors[err.code] || '⚠️ ' + err.message, 'fail');
    }
  });
</script>

</body>
</html>
